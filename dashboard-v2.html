<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SIDAMU V2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
background:#021126;
color:white;
}

.sidebar{
width:250px;
height:100vh;
background:#042247;
padding:20px;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#00cfff;
cursor:pointer;
font-weight:bold;
}

.main{
margin-left:250px;
padding:20px;
width:100%;
}

.page{
display:none;
}

.active{
display:block;
}

.card{
background:#042247;
padding:20px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #00cfff;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
background:#00cfff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>
<script type="module">

import { db } from "./firebase-config.js";

import {
collection,
query,
where,
getDocs,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document
.getElementById("updateBtn")
.onclick = async()=>{

const nama =
document.getElementById("namaInput").value;

const skor =
document.getElementById("skorInput").value;

const status =
document.getElementById("statusInput").value;

const tanggal =
document.getElementById("tanggalInput").value;

const q=query(
collection(db,"damiu"),
where("Nama DAM","==",nama)
);

const snap=await getDocs(q);

if(snap.empty){

document
.getElementById("hasilUpdate")
.innerHTML =
"❌ Depot tidak ditemukan";

return;

}

await updateDoc(
snap.docs[0].ref,
{
"Skor Akhir":skor,
"Status":status,
"Tanggal Penilaian":tanggal
}
);

document
.getElementById("hasilUpdate")
.innerHTML =
"✅ Data berhasil diupdate";

};

</script>
<body>

<div class="sidebar">

<h2>SIDAMU</h2>

<button onclick="window.location.href='dashboard.html'">
📊 Dashboard Statistik
</button>

<button onclick="window.location.href='input.html'">
📝 Input Hasil
</button>

<button onclick="window.location.href='create-depot.html'">
🏢 Tambah Depot
</button>

<button onclick="window.location.href='depot-dashboard.html'">
👤 Dashboard Depot
</button>


</div>

<div class="main">

<div id="dashboard" class="page active">

<div class="card">
<h2>Dashboard SIDAMU</h2>
<p>Data statistik akan tampil di sini</p>
</div>

</div>

<div id="input" class="page">

<div class="card">

<h2>Input Hasil Pemeriksaan</h2>

<br>

<input id="namaInput" placeholder="Nama DAM">

<br><br>

<input id="skorInput" placeholder="Skor Akhir">

<br><br>

<input id="statusInput" placeholder="Status">

<br><br>

<input id="tanggalInput" placeholder="Tanggal Penilaian">

<br><br>

<button id="updateBtn">

SIMPAN PERUBAHAN

</button>

<br><br>

<div id="hasilUpdate"></div>

</div>

</div>

<div id="depot" class="page">

<div class="card">
<h2>Tambah Depot</h2>
</div>

</div>

<div id="riwayat" class="page">

<div class="card">
<h2>Riwayat Pemeriksaan</h2>
</div>

</div>

</div>

<script>

function showPage(page){

document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(page)
.classList.add("active");

}

</script>

</body>
</html>
